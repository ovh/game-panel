name: "🐛 Bug Report"
description: Report an issue or unexpected behavior in the Game Panel.
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.

  - type: input
    id: panel_version
    attributes:
      label: Game Panel version
      description: Which version of the Game Panel are you using?
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the issue.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Explain how to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Start ...
        4. Observe the error ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Please provide relevant logs or error messages if available.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context, screenshots or information here.